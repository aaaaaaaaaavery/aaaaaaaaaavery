<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Nitter Feed Widget</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
      background: #15202b;
      color: #ffffff;
      padding: 0;
      margin: 0;
    }
    
    .nitter-widget {
      max-width: 100%;
      background: #15202b;
    }
    
    .widget-header {
      padding: 12px 16px;
      border-bottom: 1px solid #38444d;
      display: flex;
      align-items: center;
      gap: 12px;
      background: #192734;
    }
    
    .widget-header .avatar {
      width: 40px;
      height: 40px;
      border-radius: 50%;
      background: #1da1f2;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: bold;
      font-size: 18px;
    }
    
    .widget-header .info h3 {
      font-size: 15px;
      font-weight: bold;
      margin-bottom: 2px;
    }
    
    .widget-header .info .username {
      font-size: 13px;
      color: #8899a6;
    }
    
    .tweet-list {
      max-height: 600px;
      overflow-y: auto;
    }
    
    .tweet-item {
      padding: 16px;
      border-bottom: 1px solid #38444d;
      transition: background 0.2s;
    }
    
    .tweet-item:hover {
      background: #192734;
    }
    
    .tweet-header {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 8px;
    }
    
    .tweet-author {
      font-weight: bold;
      font-size: 15px;
    }
    
    .tweet-handle {
      color: #8899a6;
      font-size: 15px;
    }
    
    .tweet-date {
      color: #8899a6;
      font-size: 13px;
      margin-left: auto;
    }
    
    .tweet-content {
      font-size: 15px;
      line-height: 1.5;
      white-space: pre-wrap;
      word-wrap: break-word;
      margin-bottom: 12px;
    }
    
    .tweet-content a {
      color: #1da1f2;
      text-decoration: none;
    }
    
    .tweet-content a:hover {
      text-decoration: underline;
    }
    
    .tweet-media {
      margin-top: 12px;
      border-radius: 12px;
      overflow: hidden;
    }
    
    .tweet-media img {
      width: 100%;
      height: auto;
      display: block;
    }
    
    .tweet-link {
      margin-top: 12px;
      font-size: 13px;
    }
    
    .tweet-link a {
      color: #8899a6;
      text-decoration: none;
    }
    
    .tweet-link a:hover {
      color: #1da1f2;
    }
    
    .loading {
      padding: 40px;
      text-align: center;
      color: #8899a6;
    }
    
    .error {
      padding: 40px;
      text-align: center;
      color: #f4212e;
    }
    
    /* Scrollbar styling */
    .tweet-list::-webkit-scrollbar {
      width: 8px;
    }
    
    .tweet-list::-webkit-scrollbar-track {
      background: #192734;
    }
    
    .tweet-list::-webkit-scrollbar-thumb {
      background: #38444d;
      border-radius: 4px;
    }
    
    .tweet-list::-webkit-scrollbar-thumb:hover {
      background: #4a5560;
    }
  </style>
</head>
<body>
  <div class="nitter-widget" id="nitterWidget">
    <div class="loading">Loading tweets...</div>
  </div>

  <script>
    // Configuration
    const WIDGET_CONFIG = {
      username: 'BuffaloSabres',
      feedUrl: '/feeds/nitter-buffalosabres.xml', // Relative to RSS service
      maxTweets: 20
    };

    // Get feed URL from query parameter or use default
    const urlParams = new URLSearchParams(window.location.search);
    const username = urlParams.get('username') || WIDGET_CONFIG.username;
    let feedUrl = urlParams.get('feed') || `/feeds/nitter-buffalosabres.xml`;
    
    // If no base URL specified and we're not in an iframe, use current origin
    const baseUrl = window.location.origin;
    
    // Helper to get absolute feed URL
    function getFeedUrl() {
      if (feedUrl.startsWith('http')) return feedUrl;
      // Get base URL from current location (assumes RSS service is on same origin)
      return baseUrl + feedUrl;
    }

    // Parse date to relative time
    function getRelativeTime(dateString) {
      const date = new Date(dateString);
      const now = new Date();
      const diff = now - date;
      const minutes = Math.floor(diff / 60000);
      const hours = Math.floor(diff / 3600000);
      const days = Math.floor(diff / 86400000);
      
      if (minutes < 1) return 'just now';
      if (minutes < 60) return `${minutes}m`;
      if (hours < 24) return `${hours}h`;
      if (days < 7) return `${days}d`;
      return date.toLocaleDateString();
    }

    // Clean HTML from description
    function cleanHTML(html) {
      const div = document.createElement('div');
      div.innerHTML = html;
      return div.textContent || div.innerText || '';
    }

    // Render tweet item
    function renderTweet(tweet) {
      const content = cleanHTML(tweet.description || tweet.title || '');
      const link = tweet.link || '#';
      const date = getRelativeTime(tweet.pubDate || tweet.publishedAt || new Date());
      
          // Extract author from title or link
      const authorMatch = tweet.title?.match(/^(.+?)\s*@/) || 
                         link.match(/nitter\.(?:net|poast\.org|it|unixfox\.eu)\/([^/]+)/);
      const author = authorMatch ? (authorMatch[1] || authorMatch[2] || 'Buffalo Sabres') : 'Buffalo Sabres';
      const handle = `@${username}`;
      
      // Get author for widget header
      const widgetAuthor = author;
      
      return `
        <div class="tweet-item">
          <div class="tweet-header">
            <span class="tweet-author">${author}</span>
            <span class="tweet-handle">${handle}</span>
            <span class="tweet-date">${date}</span>
          </div>
          <div class="tweet-content">${content}</div>
          ${tweet.enclosure || tweet.image ? `
            <div class="tweet-media">
              <img src="${tweet.enclosure || tweet.image}" alt="Tweet media" />
            </div>
          ` : ''}
          <div class="tweet-link">
            <a href="${link}" target="_blank" rel="noopener">View on Nitter</a>
          </div>
        </div>
      `;
    }

    // Load and render feed
    async function loadFeed() {
      const widget = document.getElementById('nitterWidget');
      
      try {
        const absoluteUrl = getFeedUrl();
        const response = await fetch(absoluteUrl);
        if (!response.ok) {
          throw new Error(`HTTP error! status: ${response.status}`);
        }
        
        const xml = await response.text();
        const parser = new DOMParser();
        const xmlDoc = parser.parseFromString(xml, 'text/xml');
        
        // Check for parsing errors
        const parserError = xmlDoc.querySelector('parsererror');
        if (parserError) {
          throw new Error('Failed to parse RSS feed');
        }
        
        // Extract items (support both RSS and Atom)
        let items = Array.from(xmlDoc.getElementsByTagName('item'));
        if (items.length === 0) {
          items = Array.from(xmlDoc.getElementsByTagName('entry'));
        }
        
        if (items.length === 0) {
          widget.innerHTML = '<div class="error">No tweets found in feed.</div>';
          return;
        }
        
        // Parse items
        const tweets = items.slice(0, WIDGET_CONFIG.maxTweets).map(item => {
          const title = item.querySelector('title')?.textContent || '';
          const link = item.querySelector('link')?.textContent || 
                      item.querySelector('link')?.getAttribute('href') || 
                      item.querySelector('guid')?.textContent || '#';
          const description = item.querySelector('description')?.textContent || 
                             item.querySelector('content')?.textContent || '';
          const pubDate = item.querySelector('pubDate')?.textContent || 
                         item.querySelector('published')?.textContent || 
                         item.querySelector('updated')?.textContent || '';
          const enclosure = item.querySelector('enclosure')?.getAttribute('url');
          const mediaContent = item.querySelector('media\\:content')?.getAttribute('url') ||
                              item.querySelector('content[type="image"]')?.getAttribute('url');
          const image = mediaContent || enclosure;
          
          return { title, link, description, pubDate, enclosure, image };
        });
        
        // Get feed title for header
        const feedTitle = xmlDoc.querySelector('channel > title')?.textContent || 
                         xmlDoc.querySelector('feed > title')?.textContent || 
                         `${author}'s Tweets`;
        
        // Get author for header (from first tweet or default)
        const headerAuthor = tweets.length > 0 
          ? tweets[0].title?.match(/^(.+?)\s*@/)?.[1] || 
            tweets[0].link?.match(/nitter\.(?:net|poast\.org|it|unixfox\.eu)\/([^/]+)/)?.[1] || 
            'Buffalo Sabres'
          : 'Buffalo Sabres';
        
        // Render widget
        widget.innerHTML = `
          <div class="widget-header">
            <div class="avatar">${username.charAt(0).toUpperCase()}</div>
            <div class="info">
              <h3>${headerAuthor}</h3>
              <div class="username">${handle}</div>
            </div>
          </div>
          <div class="tweet-list">
            ${tweets.map(renderTweet).join('')}
          </div>
        `;
        
      } catch (error) {
        console.error('Error loading feed:', error);
        widget.innerHTML = `
          <div class="error">
            Error loading feed: ${error.message}<br/>
            <small>Make sure the RSS feed service is running and accessible.</small>
          </div>
        `;
      }
    }

    // Load feed on page load
    loadFeed();
    
    // Auto-refresh every 5 minutes
    setInterval(loadFeed, 5 * 60 * 1000);
  </script>
</body>
</html>
