<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="robots" content="noindex,nofollow,noarchive" />
  <title>THPORTH Admin Process</title>
  <style>
    :root {
      --bg: #f6f7fb;
      --card: #ffffff;
      --text: #101828;
      --muted: #667085;
      --line: #e4e7ec;
      --accent: #175cd3;
      --ok-bg: #ecfdf3;
      --ok-line: #abefc6;
      --lock-bg: #f9fafb;
      --lock-text: #98a2b3;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      background: linear-gradient(180deg, #f9fbff 0%, var(--bg) 100%);
      color: var(--text);
      font: 14px/1.5 "Segoe UI", -apple-system, BlinkMacSystemFont, "Helvetica Neue", Arial, sans-serif;
    }

    .wrap {
      max-width: 1440px;
      margin: 0 auto;
      min-height: 100vh;
      padding: 16px;
      display: grid;
      gap: 16px;
      grid-template-rows: auto 1fr;
    }

    .card {
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 12px;
      box-shadow: 0 1px 2px rgba(16, 24, 40, 0.06);
    }

    .top {
      padding: 14px 16px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
    }

    .title {
      margin: 0;
      font-size: 18px;
      font-weight: 700;
    }

    .muted { color: var(--muted); }

    .pill {
      border: 1px solid #b2ddff;
      background: #eff8ff;
      color: #175cd3;
      border-radius: 999px;
      padding: 4px 10px;
      font-size: 12px;
      font-weight: 600;
      white-space: nowrap;
    }

    .layout {
      display: grid;
      grid-template-columns: 320px 360px 1fr;
      gap: 16px;
      min-height: 0;
    }

    .panel {
      min-height: 0;
      display: flex;
      flex-direction: column;
    }

    .panel h2 {
      margin: 0;
      padding: 12px 14px;
      border-bottom: 1px solid var(--line);
      font-size: 14px;
    }

    .panel-body {
      min-height: 0;
      overflow: auto;
      padding: 10px;
      display: grid;
      gap: 8px;
      align-content: start;
    }

    .step {
      border: none;
      border-radius: 0;
      padding: 4px 2px;
      display: grid;
      gap: 4px;
      background: transparent;
      cursor: pointer;
    }

    .step-head {
      display: flex;
      gap: 8px;
      align-items: flex-start;
    }

    .step.done {
      border: none;
      background: transparent;
    }

    .step.active {
      border-color: #84caff;
      background: #eff8ff;
      border: 1px solid #84caff;
      border-radius: 10px;
      padding: 10px;
      color: var(--text);
    }

    .step.locked {
      background: transparent;
      cursor: not-allowed;
    }

    .step:not(.active) {
      color: #98a2b3;
    }

    .step-index {
      display: none;
      font-weight: 700;
      font-size: 12px;
      line-height: 1.2;
    }

    .step.active .step-index {
      width: 22px;
      min-width: 22px;
      text-align: center;
      border-radius: 6px;
      background: #f2f4f7;
      border: 1px solid #e4e7ec;
      line-height: 20px;
    }

    .step:not(.active) .step-index {
      color: #98a2b3;
    }

    .step-name {
      margin: 0;
      font-size: 14px;
      font-weight: 700;
      line-height: 1.35;
    }

    .step:not(.active) .step-name,
    .step:not(.active) .step-meta,
    .substep:not(.active) .substep-title {
      color: #98a2b3;
    }

    .step-meta {
      font-size: 12px;
      color: var(--muted);
    }

    input[type="checkbox"] {
      margin-top: 2px;
      width: 16px;
      height: 16px;
      min-width: 16px;
      min-height: 16px;
      max-width: 16px;
      max-height: 16px;
      flex: 0 0 16px;
      box-sizing: border-box;
      -webkit-appearance: checkbox;
      appearance: auto;
      accent-color: var(--accent);
      cursor: pointer;
    }

    .substep {
      border: none;
      border-radius: 0;
      padding: 4px 2px;
      background: transparent;
      cursor: pointer;
    }

    .substep.done {
      border: none;
      background: transparent;
    }

    .substep.active {
      border-color: #84caff;
      background: #eff8ff;
      border: 1px solid #84caff;
      border-radius: 10px;
      padding: 10px;
      color: var(--text);
    }

    .substep.locked {
      background: transparent;
      cursor: not-allowed;
    }

    .substep:not(.active) {
      color: #98a2b3;
    }

    .substep-head {
      display: flex;
      gap: 8px;
      align-items: flex-start;
    }

    .substep-title {
      margin: 0;
      font-weight: 600;
    }

    .substep-inline-icon {
      width: 16px;
      height: 16px;
      vertical-align: -2px;
    }

    .content-block {
      border: 1px solid #d0d5dd;
      border-radius: 10px;
      background: #f8fafc;
      padding: 12px;
      position: relative;
      white-space: pre-wrap;
      line-height: 1.45;
      min-height: 90px;
    }

    .panel-body.editor-mode {
      display: flex;
      flex-direction: column;
      flex: 1;
      align-items: stretch;
      overflow: hidden;
    }

    .content-block.editor-shell {
      width: 100%;
      flex: 1;
      min-height: 600px;
      display: flex;
      padding: 8px;
      background: #fff;
    }

    .content-editor {
      width: 100%;
      height: 100%;
      border: 1px solid #d0d5dd;
      border-radius: 8px;
      padding: 10px;
      font: inherit;
      line-height: 1.45;
      color: var(--text);
      background: #fff;
      resize: none;
    }

    .copy-btn {
      position: absolute;
      top: 8px;
      right: 8px;
      border: 1px solid #b2ddff;
      background: #eff8ff;
      color: #175cd3;
      border-radius: 8px;
      padding: 5px 8px;
      font-size: 11px;
      font-weight: 600;
      cursor: pointer;
    }

    .controls {
      padding: 10px;
      border-top: 1px solid var(--line);
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }

    button {
      border: 1px solid #d0d5dd;
      background: #fff;
      color: var(--text);
      border-radius: 8px;
      padding: 7px 10px;
      font-weight: 600;
      cursor: pointer;
    }

    button.danger {
      border-color: #fecdca;
      background: #fef3f2;
      color: #b42318;
    }

    .empty {
      color: var(--muted);
      border: 1px dashed #d0d5dd;
      border-radius: 10px;
      padding: 10px;
      background: #fcfcfd;
    }

    @media (max-width: 1200px) {
      .layout { grid-template-columns: 1fr; }
    }
  </style>
</head>

      }

      function orderedSteps() {
        return (templates.steps || []).slice().sort((a, b) => Number(a.number) - Number(b.number));
      }

      function firstIncompleteStepId(steps) {
        for (const step of steps) {
          if (!state.completedStepIds[step.id]) return step.id;
        }
        return null;
      }

      function isStepUnlocked(step, steps) {
        const firstIncomplete = firstIncompleteStepId(steps);
        if (!firstIncomplete) return true;
        if (state.completedStepIds[step.id]) return true;
        return step.id === firstIncomplete;
      }

      function isFutureStep(step, steps) {
        const firstIncomplete = firstIncompleteStepId(steps);
        if (!firstIncomplete) return false;
        const currentIdx = steps.findIndex((s) => s.id === step.id);
        const firstIdx = steps.findIndex((s) => s.id === firstIncomplete);
        if (currentIdx < 0 || firstIdx < 0) return false;
        return currentIdx > firstIdx;
      }

      function setStepComplete(stepId, checked) {
        const steps = orderedSteps();
        const step = steps.find((s) => s.id === stepId);
        if (!step) return;
        if (checked && isFutureStep(step, steps)) return;
        const singleSub = step && Array.isArray(step.subSteps) && step.subSteps.length === 1 ? step.subSteps[0] : null;

        if (checked) {
          state.completedStepIds[stepId] = true;
          if (singleSub) {
            state.completedSubStepIds[singleSub.id] = true;
          }
          const firstIncomplete = firstIncompleteStepId(steps);
          if (firstIncomplete) state.selectedStepId = firstIncomplete;
        } else {
          const idx = steps.findIndex(s => s.id === stepId);
          if (idx >= 0) {
            clearSubStepsForSteps(steps.slice(idx));
            for (let i = idx; i < steps.length; i++) {
              delete state.completedStepIds[steps[i].id];
            }
            state.selectedStepId = stepId;
          }
        }

        saveState();
        render();
      }

      function isSubStepDone(subStepId) {
        return !!state.completedSubStepIds[subStepId];
      }

      function firstIncompleteSubStepId(subSteps) {
        for (const sub of subSteps || []) {
          if (!isSubStepDone(sub.id)) return sub.id;
        }
        return null;
      }

      function isSubStepUnlocked(subStep, subSteps) {
        const firstIncomplete = firstIncompleteSubStepId(subSteps || []);
        if (!firstIncomplete) return true;
        if (isSubStepDone(subStep.id)) return true;
        return subStep.id === firstIncomplete;
      }

      function isFutureSubStep(subStep, subSteps) {
        const firstIncomplete = firstIncompleteSubStepId(subSteps || []);
        if (!firstIncomplete) return false;
        const currentIdx = (subSteps || []).findIndex((s) => s.id === subStep.id);
        const firstIdx = (subSteps || []).findIndex((s) => s.id === firstIncomplete);
        if (currentIdx < 0 || firstIdx < 0) return false;
        return currentIdx > firstIdx;
      }

      function setSubStepComplete(step, subStepId, checked) {
        const subSteps = Array.isArray(step && step.subSteps) ? step.subSteps : [];
        const targetSubStep = subSteps.find((s) => s.id === subStepId);
        if (!targetSubStep) return;
        if (checked && isFutureSubStep(targetSubStep, subSteps)) return;
        const isSingleSubStep = !!(step && step.id && subSteps.length === 1 && subSteps[0].id === subStepId);
        const isLastSubStep = !!(subSteps.length && subSteps[subSteps.length - 1].id === subStepId);

        if (checked) {
          state.completedSubStepIds[subStepId] = true;

          if (isSingleSubStep && step && step.id) {
            const steps = orderedSteps();
            state.completedStepIds[step.id] = true;
            const firstIncompleteStep = firstIncompleteStepId(steps);
            if (firstIncompleteStep) {
              state.selectedStepId = firstIncompleteStep;
              state.selectedSubStepId = null;
            }
          } else if (step && step.id && subSteps.length > 1 && isLastSubStep) {
            // For multi-sub-step steps, only the last sub-step can complete the step.
            const allPriorDone = subSteps.slice(0, -1).every((s) => isSubStepDone(s.id));
            if (allPriorDone) {
              state.completedStepIds[step.id] = true;
            }
            const steps = orderedSteps();
            const firstIncompleteStep = firstIncompleteStepId(steps);
            if (firstIncompleteStep && firstIncompleteStep !== step.id) {
              state.selectedStepId = firstIncompleteStep;
              state.selectedSubStepId = null;
            }
          }

          const nextIncomplete = firstIncompleteSubStepId(subSteps);
          if (nextIncomplete && (!step || state.selectedStepId === step.id)) {
            state.selectedSubStepId = nextIncomplete;
          }
        } else {
          if (step && step.id) {
            delete state.completedStepIds[step.id];
          }

          if (isSingleSubStep) {
            const steps = orderedSteps();
            const idx = steps.findIndex((s) => s.id === step.id);
            if (idx >= 0) {
              clearSubStepsForSteps(steps.slice(idx));
              for (let i = idx; i < steps.length; i++) {
                delete state.completedStepIds[steps[i].id];
              }
              state.selectedStepId = step.id;
              state.selectedSubStepId = subStepId;
              saveState();
              render();
              return;
            }
          }

          const idx = subSteps.findIndex(s => s.id === subStepId);
          if (idx >= 0) {
            for (let i = idx; i < subSteps.length; i++) {
              delete state.completedSubStepIds[subSteps[i].id];
            }
            state.selectedSubStepId = subStepId;
          } else {
            delete state.completedSubStepIds[subStepId];
          }
        }
        saveState();
        render();
      }

      function clearSubStepsForSteps(stepsToClear) {
        for (const step of stepsToClear) {
          for (const sub of (step.subSteps || [])) {
            delete state.completedSubStepIds[sub.id];
          }
        }
      }

      function copyText(text, buttonEl) {
        navigator.clipboard.writeText(String(text || '')).then(() => {
          const prev = buttonEl.textContent;
          buttonEl.textContent = 'Copied';
          setTimeout(() => { buttonEl.textContent = prev; }, 900);
        }).catch(() => {
          const prev = buttonEl.textContent;
          buttonEl.textContent = 'Failed';
          setTimeout(() => { buttonEl.textContent = prev; }, 900);
        });
      }

      function render() {
        const steps = orderedSteps();
        const selectedStep = resolveSelectedStep(steps);
        const selectedSub = resolveSelectedSubStep(selectedStep);
        saveState();

        app.innerHTML = '';

        const header = document.createElement('section');
        header.className = 'card top';
        header.innerHTML = `
          <div>
            <h1 class="title">THPORTH Admin Process</h1>
            <div class="muted">Date: ${state.dateKey} · Last saved: ${new Date(state.updatedAt).toLocaleString()}</div>
          </div>
          <span class="pill">Admin Process</span>
        `;

        const main = document.createElement('section');
        main.className = 'layout';

        const col1 = document.createElement('div');
        col1.className = 'card panel';
        col1.innerHTML = '<h2>Column 1: Steps</h2>';
        const col1Body = document.createElement('div');
        col1Body.className = 'panel-body';

        for (const step of steps) {
          const unlocked = isStepUnlocked(step, steps);
          const futureStep = isFutureStep(step, steps);
          const done = !!state.completedStepIds[step.id];
          const isActive = selectedStep && selectedStep.id === step.id;

          const el = document.createElement('div');
          el.className = 'step';
          if (done) el.classList.add('done');
          if (isActive) el.classList.add('active');
          if (!unlocked && !done) el.classList.add('locked');

          const head = document.createElement('div');
          head.className = 'step-head';

          const idx = document.createElement('div');
          idx.className = 'step-index';
          idx.textContent = String(step.number);

          const check = document.createElement('input');
          check.type = 'checkbox';
          check.checked = done;
          const hasSubSteps = Array.isArray(step.subSteps) && step.subSteps.length > 0;
          const canToggleStepDirectly = !hasSubSteps;
          check.disabled = !canToggleStepDirectly || futureStep || (!unlocked && !done);
          check.addEventListener('click', (e) => e.stopPropagation());
          if (canToggleStepDirectly) {
            check.addEventListener('change', () => {
              if (check.disabled) return;
              setStepComplete(step.id, check.checked);
            });
          }

          const nameWrap = document.createElement('div');
          const name = document.createElement('p');
          name.className = 'step-name';
          name.textContent = step.name;

          const meta = document.createElement('div');
          meta.className = 'step-meta';
          meta.textContent = done ? 'Complete' : (unlocked ? 'Current step' : 'Locked');

          nameWrap.appendChild(name);
          nameWrap.appendChild(meta);

          head.appendChild(idx);
          head.appendChild(check);
          head.appendChild(nameWrap);
          el.appendChild(head);

          el.addEventListener('click', () => {
            if (!unlocked && !done) return;
            state.selectedStepId = step.id;
            state.selectedSubStepId = null;
            saveState();
            render();
          });

          col1Body.appendChild(el);
        }

        if (!steps.length) {
          col1Body.innerHTML = '<div class="empty">No steps configured yet.</div>';
        }

        col1.appendChild(col1Body);

        const col1Controls = document.createElement('div');
        col1Controls.className = 'controls';
        const resetBtn = document.createElement('button');
        resetBtn.className = 'danger';
        resetBtn.textContent = 'Reset Progress';
        resetBtn.onclick = () => {
          if (!confirm('Reset progress for all steps?')) return;
          state.completedStepIds = {};
          state.completedSubStepIds = {};
          state.selectedStepId = steps[0] ? steps[0].id : null;
          state.selectedSubStepId = null;
          saveState();
          render();
        };
        col1Controls.appendChild(resetBtn);
        col1.appendChild(col1Controls);

        const col2 = document.createElement('div');
        col2.className = 'card panel';
        col2.innerHTML = '<h2>Column 2: Sub-steps</h2>';
        const col2Body = document.createElement('div');
        col2Body.className = 'panel-body';

        if (selectedStep && Array.isArray(selectedStep.subSteps) && selectedStep.subSteps.length) {
          const subSteps = selectedStep.subSteps;
          for (const sub of subSteps) {
            const subDone = isSubStepDone(sub.id);
            const subUnlocked = isSubStepUnlocked(sub, subSteps);
            const subFuture = isFutureSubStep(sub, subSteps);
            const el = document.createElement('div');
            el.className = 'substep' + (subDone ? ' done' : '') + ((selectedSub && selectedSub.id === sub.id) ? ' active' : '');
            if (!subUnlocked && !subDone) el.classList.add('locked');

            const head = document.createElement('div');
            head.className = 'substep-head';

            const check = document.createElement('input');
            check.type = 'checkbox';
            check.checked = subDone;
            check.disabled = subFuture || (!subUnlocked && !subDone);
            check.addEventListener('click', (e) => e.stopPropagation());
            check.addEventListener('change', () => {
              if (check.disabled) return;
              setSubStepComplete(selectedStep, sub.id, check.checked);
            });

            const t = document.createElement('p');
            t.className = 'substep-title';
            t.textContent = sub.title;
            if (sub.id === 'step-1-sub-1' || sub.id === 'step-2-sub-1' || sub.id === 'step-2-sub-2' || sub.id === 'step-2-sub-5' || sub.id === 'step-2-sub-6' || sub.id === 'step-3-sub-1' || sub.id === 'step-3-sub-2' || sub.id === 'step-4-sub-1' || sub.id === 'step-4-sub-2' || sub.id === 'step-4-sub-5' || sub.id === 'step-5-sub-1' || sub.id === 'step-5-sub-2' || sub.id === 'step-6-sub-2' || sub.id === 'step-7-sub-1' || sub.id === 'step-7-sub-2' || sub.id === 'step-7-sub-3') {
              const icon = document.createElementNS('http://www.w3.org/2000/svg', 'svg');
              icon.setAttribute('xmlns', 'http://www.w3.org/2000/svg');
              icon.setAttribute('fill', 'none');
              icon.setAttribute('viewBox', '0 0 24 24');
              icon.setAttribute('stroke-width', '1.5');
              icon.setAttribute('stroke', 'currentColor');
              icon.setAttribute('class', 'substep-inline-icon');

              const path = document.createElementNS('http://www.w3.org/2000/svg', 'path');
              path.setAttribute('stroke-linecap', 'round');
              path.setAttribute('stroke-linejoin', 'round');
              path.setAttribute('d', 'M13.5 4.5 21 12m0 0-7.5 7.5M21 12H3');
              icon.appendChild(path);

              t.appendChild(document.createTextNode(' '));
              t.appendChild(icon);
            }

            head.appendChild(check);
            head.appendChild(t);
            el.appendChild(head);

            el.addEventListener('click', () => {
              if (!subUnlocked && !subDone) return;
              state.selectedSubStepId = sub.id;
              saveState();
              render();
            });
            col2Body.appendChild(el);
          }
        } else {
          col2Body.innerHTML = '<div class="empty">Select a step to view sub-steps.</div>';
        }
        col2.appendChild(col2Body);

        const col3 = document.createElement('div');
        col3.className = 'card panel';
        col3.innerHTML = '<h2>Column 3: Content / Copy</h2>';
        const col3Body = document.createElement('div');
        col3Body.className = 'panel-body';

        const rawBlocks = selectedSub && Array.isArray(selectedSub.contentBlocks) ? selectedSub.contentBlocks : [];
        const blocks = rawBlocks.filter((block) => {
          const text = String(block && block.text ? block.text : '').trim();
          const url = String(block && block.url ? block.url : '').trim();
          if (block && block.type === 'link') return url.length > 0 || text.length > 0;
          if (block && block.type === 'textarea') return true;
          return text.length > 0;
        });
        if (blocks.length) {
          const hasTextarea = blocks.some((block) => block && block.type === 'textarea');
          if (hasTextarea) {
            col3Body.classList.add('editor-mode');
          }

          for (const block of blocks) {
            const el = document.createElement('div');
            el.className = 'content-block';

            if (block.id === 'step-2-sub-1-block-1') {
              renderLivesportLeagueLinks(el, block.text || '');
            } else if (block.type === 'link') {
              const a = document.createElement('a');
              a.href = block.url || '';
              a.target = '_blank';
              a.rel = 'noopener noreferrer';
              a.textContent = block.text || block.url || '';
              el.appendChild(a);
            } else if (block.type === 'textarea') {
              el.classList.add('editor-shell');
              const textarea = document.createElement('textarea');
              textarea.className = 'content-editor';
              textarea.placeholder = 'Paste list here...';
              textarea.value = block.text || '';
              el.appendChild(textarea);
              const saveBtn = document.createElement('button');
              saveBtn.className = 'copy-btn';
              saveBtn.textContent = 'Save';
              saveBtn.onclick = (e) => {
                e.preventDefault();
                const nextValue = filterExcludedLivesportLeagues(textarea.value);
                state.livesportLeaguesList = nextValue;
                block.text = nextValue;
                textarea.value = nextValue;
                syncLivesportLeagueListAcrossSteps(true);
                saveState();
                const prev = saveBtn.textContent;
                saveBtn.textContent = 'Saved';
                setTimeout(() => { saveBtn.textContent = prev; }, 900);
              };
              el.appendChild(saveBtn);
            } else {
              el.textContent = block.text || '';
              if (block.type === 'note') {
                el.style.fontStyle = 'italic';
              }
            }

            if (block.type === 'copy') {
              const btn = document.createElement('button');
              btn.className = 'copy-btn';
              btn.textContent = 'Copy';
              btn.onclick = (e) => {
                e.preventDefault();
                copyText(block.text || '', btn);
              };
              el.appendChild(btn);
            }

            col3Body.appendChild(el);
          }
        }

        col3.appendChild(col3Body);

        main.appendChild(col1);
        main.appendChild(col2);
        main.appendChild(col3);

        app.appendChild(header);
        app.appendChild(main);
      }

      function resolveSelectedStep(steps) {
        const selected = steps.find(s => s.id === state.selectedStepId);
        if (selected) return selected;

        const firstIncomplete = firstIncompleteStepId(steps);
        const fallback = steps.find(s => s.id === firstIncomplete) || steps[0] || null;
        state.selectedStepId = fallback ? fallback.id : null;
        return fallback;
      }

      function resolveSelectedSubStep(step) {
        if (!step || !Array.isArray(step.subSteps) || !step.subSteps.length) {
          state.selectedSubStepId = null;
          return null;
        }

        const selected = step.subSteps.find(s => s.id === state.selectedSubStepId);
        if (selected) {
          if (isSubStepUnlocked(selected, step.subSteps) || isSubStepDone(selected.id)) return selected;
        }

        const firstIncomplete = firstIncompleteSubStepId(step.subSteps);
        const fallback = step.subSteps.find(s => s.id === firstIncomplete) || step.subSteps[0];
        state.selectedSubStepId = fallback.id;
        return fallback;
      }
    })();
  </script>
</body>
