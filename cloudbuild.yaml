steps:
  - name: 'gcr.io/cloud-builders/docker'
    args: ['build', '-t', 'gcr.io/$PROJECT_ID/flashlive-scraper', '.']
    timeout: '3600s'  # 60 minutes
  - name: 'gcr.io/cloud-builders/docker'
    args: ['push', 'gcr.io/$PROJECT_ID/flashlive-scraper']
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: gcloud
    args:
      - 'run'
      - 'deploy'
      - 'flashlive-scraper'
      - '--image'
      - 'gcr.io/$PROJECT_ID/flashlive-scraper'
      - '--region'
      - 'us-central1'
      - '--allow-unauthenticated'
timeout: '3600s'
options:
  machineType: 'E2_HIGHCPU_8'

