<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sports Standings</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #1f1f1f;
            color: #e5e7eb;
            padding: 20px;
        }
        
        .standings-container {
            max-width: 1200px;
            margin: 0 auto;
        }
        
        .league-section {
            margin-bottom: 40px;
            background-color: #2a2a2a;
            border-radius: 8px;
            padding: 20px;
        }
        
        .league-title {
            font-size: 24px;
            font-weight: bold;
            margin-bottom: 10px;
            color: #fff;
        }
        
        .last-updated {
            font-size: 12px;
            color: #9ca3af;
            margin-bottom: 15px;
        }
        
        table {
            width: 100%;
            border-collapse: collapse;
        }
        
        th {
            background-color: #374151;
            padding: 10px;
            text-align: left;
            font-size: 12px;
            text-transform: uppercase;
            border-bottom: 2px solid #4b5563;
        }
        
        td {
            padding: 10px;
            border-bottom: 1px solid #374151;
            font-size: 14px;
        }
        
        tr:hover {
            background-color: #374151;
        }
        
        .rank {
            font-weight: bold;
            width: 50px;
        }
        
        .team {
            font-weight: bold;
        }
        
        .error {
            color: #ef4444;
            padding: 20px;
            text-align: center;
        }
        
        .loading {
            text-align: center;
            padding: 40px;
            font-size: 18px;
        }
    </style>
</head>
<body>
    <div class="standings-container">
        <h1>Sports Standings</h1>
        
        <div id="nba-standings" class="league-section">
            <div class="league-title">NBA Standings</div>
            <div class="loading">Loading...</div>
        </div>
        
        <div id="nfl-standings" class="league-section">
            <div class="league-title">NFL Standings</div>
            <div class="loading">Loading...</div>
        </div>
        
        <div id="mlb-standings" class="league-section">
            <div class="league-title">MLB Standings</div>
            <div class="loading">Loading...</div>
        </div>
        
        <div id="wnba-standings" class="league-section">
            <div class="league-title">WNBA Standings</div>
            <div class="loading">Loading...</div>
        </div>
    </div>

    <!-- Firebase SDK -->
    <script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-firestore-compat.js"></script>

    <script>
        // Initialize Firebase (use your config)
        const firebaseConfig = {
            apiKey: "AIzaSyD3bw8d4q2oO2qpbgGiUG6Qnlf4aABK3Bc",
            authDomain: "flashlive-daily-scraper.firebaseapp.com",
            projectId: "flashlive-daily-scraper",
            storageBucket: "flashlive-daily-scraper.appspot.com",
            messagingSenderId: "124291936014",
            appId: "1:124291936014:web:8a9b0c1d2e3f4g5h6i7j8k"
        };
        
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();

        // Format timestamp
        function formatTimestamp(timestamp) {
            if (!timestamp) return 'Never';
            const date = timestamp.toDate();
            return date.toLocaleString();
        }

        // Load NBA Standings
        async function loadNBAStandings() {
            try {
                const doc = await db.collection('standings').doc('NBA').get();
                
                if (!doc.exists) {
                    document.getElementById('nba-standings').innerHTML = 
                        '<div class="league-title">NBA Standings</div><div class="error">No data available</div>';
                    return;
                }
                
                const standings = doc.data();
                const lastUpdated = formatTimestamp(standings.lastUpdated);
                
                let html = `
                    <div class="league-title">NBA Standings</div>
                    <div class="last-updated">Last updated: ${lastUpdated}</div>
                    <table>
                        <thead>
                            <tr>
                                <th class="rank">Rank</th>
                                <th class="team">Team</th>
                                <th>Conference</th>
                                <th>W</th>
                                <th>L</th>
                                <th>PCT</th>
                                <th>GB</th>
                                <th>Home</th>
                                <th>Away</th>
                                <th>L10</th>
                                <th>Streak</th>
                            </tr>
                        </thead>
                        <tbody>
                `;
                
                standings.data.forEach(team => {
                    html += `
                        <tr>
                            <td class="rank">${team.Rank}</td>
                            <td class="team">${team.Team}</td>
                            <td>${team.Conference}</td>
                            <td>${team.Wins}</td>
                            <td>${team.Losses}</td>
                            <td>${team.Percentage}</td>
                            <td>${team.GamesBack === 0 ? '-' : team.GamesBack}</td>
                            <td>${team.HomeWins}-${team.HomeLosses}</td>
                            <td>${team.AwayWins}-${team.AwayLosses}</td>
                            <td>${team.LastTenWins}-${team.LastTenLosses}</td>
                            <td>${team.Streak}</td>
                        </tr>
                    `;
                });
                
                html += '</tbody></table>';
                document.getElementById('nba-standings').innerHTML = html;
                
            } catch (error) {
                console.error('Error loading NBA standings:', error);
                document.getElementById('nba-standings').innerHTML = 
                    '<div class="league-title">NBA Standings</div><div class="error">Error loading standings</div>';
            }
        }

        // Load NFL Standings
        async function loadNFLStandings() {
            try {
                const doc = await db.collection('standings').doc('NFL').get();
                
                if (!doc.exists) {
                    document.getElementById('nfl-standings').innerHTML = 
                        '<div class="league-title">NFL Standings</div><div class="error">No data available</div>';
                    return;
                }
                
                const standings = doc.data();
                const lastUpdated = formatTimestamp(standings.lastUpdated);
                
                let html = `
                    <div class="league-title">NFL Standings</div>
                    <div class="last-updated">Last updated: ${lastUpdated}</div>
                    <table>
                        <thead>
                            <tr>
                                <th class="rank">Rank</th>
                                <th class="team">Team</th>
                                <th>Conference</th>
                                <th>Division</th>
                                <th>W</th>
                                <th>L</th>
                                <th>T</th>
                                <th>PCT</th>
                                <th>PF</th>
                                <th>PA</th>
                                <th>Streak</th>
                            </tr>
                        </thead>
                        <tbody>
                `;
                
                standings.data.forEach(team => {
                    html += `
                        <tr>
                            <td class="rank">${team.Rank}</td>
                            <td class="team">${team.Team}</td>
                            <td>${team.Conference}</td>
                            <td>${team.Division}</td>
                            <td>${team.Wins}</td>
                            <td>${team.Losses}</td>
                            <td>${team.Ties}</td>
                            <td>${team.Percentage}</td>
                            <td>${team.PointsFor}</td>
                            <td>${team.PointsAgainst}</td>
                            <td>${team.Streak}</td>
                        </tr>
                    `;
                });
                
                html += '</tbody></table>';
                document.getElementById('nfl-standings').innerHTML = html;
                
            } catch (error) {
                console.error('Error loading NFL standings:', error);
                document.getElementById('nfl-standings').innerHTML = 
                    '<div class="league-title">NFL Standings</div><div class="error">Error loading standings</div>';
            }
        }

        // Load MLB Standings (similar pattern)
        async function loadMLBStandings() {
            // Similar to NBA/NFL
            document.getElementById('mlb-standings').innerHTML = 
                '<div class="league-title">MLB Standings</div><div class="loading">Implementation similar to NBA/NFL...</div>';
        }

        // Load WNBA Standings (similar pattern)
        async function loadWNBAStandings() {
            // Similar to NBA/NFL
            document.getElementById('wnba-standings').innerHTML = 
                '<div class="league-title">WNBA Standings</div><div class="loading">Implementation similar to NBA/NFL...</div>';
        }

        // Load all standings on page load
        window.addEventListener('DOMContentLoaded', () => {
            loadNBAStandings();
            loadNFLStandings();
            loadMLBStandings();
            loadWNBAStandings();
        });
    </script>
</body>
</html>
